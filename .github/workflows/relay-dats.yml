name: DAT Relay

on:
  push:
    branches:
      - main
    paths:
      - 'output/**'

jobs:
  relay:
    runs-on: ubuntu-latest
    if: success()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout meshARKade-dats
        uses: actions/checkout@v4

      - name: Sync to Database Repo
        env:
          MESH_DATABASE_TOKEN: ${{ secrets.MESH_DATABASE_TOKEN }}
        run: |
          # Clone target repo
          git clone --depth 1 "https://x-access-token:${MESH_DATABASE_TOKEN}@github.com/Mesh-ARKade/meshARKade-database.git" database_repo
          
          # Setup Git config for pushing
          cd database_repo
          git config user.name "Curator Relay Bot"
          git config user.email "bot@mesh-arkade.net"
          cd ..

          # Sync output to database_repo/input
          echo "Syncing output/ to input/..."
          for source_dir in output/*; do
            [ -d "$source_dir" ] || continue
            SOURCE=$(basename "$source_dir")
            echo "Syncing $SOURCE..."
            mkdir -p "database_repo/input/$SOURCE"
            rsync -a --delete "$source_dir/" "database_repo/input/$SOURCE/"
          done

          cd database_repo
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to relay."
            exit 0
          fi

          # Commit and Push
          DATE_STAMP=$(date +'%Y-%m-%d')
          STAMP=$(date +'%s')
          BRANCH_NAME="update-dats/${DATE_STAMP}-${STAMP}"
          
          git checkout -b "$BRANCH_NAME"
          git add input/
          git commit -m "feat(catalog): sync validated DATs ($DATE_STAMP)"
          git push origin "$BRANCH_NAME"
          
          # Create PR via gh CLI
          echo "Opening PR on database repo..."
          GH_TOKEN=${{ secrets.MESH_DATABASE_TOKEN }} gh pr create \
            --repo Mesh-ARKade/meshARKade-database \
            --title "feat: sync validated DATs ($DATE_STAMP)" \
            --body "Automated relay from curator toolbelt.
            
            Synchronized \`input/\` directory with latest verified DATs.
            Environment: GitHub Actions DAT Relay
            
            This PR was automatically generated by the firehose pipeline." \
            --head "$BRANCH_NAME" \
            --base main
