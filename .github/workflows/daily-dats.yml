# =============================================================================
# Daily DAT Pipeline
# =============================================================================
#
# This workflow is the heart of the meshARKade-dats repo. It runs once a day
# to fetch the latest preservation metadata from No-Intro, TOSEC, Redump,
# and MAME.
#
# Process:
#   1. Fetch: Scrape/Download from 4 primary sources
#   2. Validate: Ensure the XML structure is correct
#   3. Relay: Open a single combined PR on meshARKade-database
#   4. Commit: Save updated version tracking back to this repo
#
# =============================================================================

name: Daily DAT Pipeline

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggers for testing

# Ensure only one pipeline runs at a time
concurrency:
  group: daily-pipeline
  cancel-in-progress: true

# Silence Node 20 deprecation warnings from actions/*@v4
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout meshARKade-dats
        uses: actions/checkout@v4

      - name: Discord notification (started)
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"
          RUN_URL="https://github.com/Mesh-ARKade/meshARKade-dats/actions/runs/${{ github.run_id }}"
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"DAT Fetch Started\",
              \"description\": \"Pipeline: Daily Fetch · Force JavaScript Node 24\n[View run](${RUN_URL})\",
              \"color\": 16776960
            }]
          }" "$DISCORD_WEBHOOK_URL"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Install 7zip (for MAME/Redump)
        run: sudo apt-get install -y p7zip-full

      # --- FETCH PHASE ---

      - name: Initialize statuses
        run: |
          echo "STATUS_NOINTRO=Skipped (Up to date)" >> $GITHUB_ENV
          echo "STATUS_TOSEC=Skipped (Up to date)" >> $GITHUB_ENV
          echo "STATUS_REDUMP=Skipped (Up to date)" >> $GITHUB_ENV
          echo "STATUS_MAME=Skipped (Up to date)" >> $GITHUB_ENV

      - name: Fetch No-Intro
        run: |
          OUTPUT=$(node scripts/fetch/no-intro.js dats/no-intro 2>&1)
          echo "$OUTPUT"
          if [[ "$OUTPUT" != *"SKIP"* ]]; then
            echo "STATUS_NOINTRO=Fetched" >> "$GITHUB_ENV"
            node scripts/extract.js dats/no-intro/*.zip .
            node scripts/validate.js output/no-intro
          else
            echo "STATUS_NOINTRO=Skipped (Warning/Error)" >> "$GITHUB_ENV"
            echo "NO_INTRO_SKIPPED=true" >> "$GITHUB_ENV"
            echo "NO_INTRO_REASON=$(echo \"$OUTPUT\" | grep -o 'SKIP: .*' | head -1 || echo 'SKIP: Unknown error')" >> "$GITHUB_ENV"
          fi

      - name: Fetch TOSEC
        run: |
          OUTPUT=$(node scripts/fetch/tosec.js dats/tosec versions.json 2>&1)
          echo "$OUTPUT"
          if [[ "$OUTPUT" != *"SKIP"* ]]; then
            echo "STATUS_TOSEC=Fetched" >> "$GITHUB_ENV"
            node scripts/extract.js dats/tosec/*.zip .
            node scripts/validate.js output/tosec
          fi

      - name: Fetch Redump
        run: |
          OUTPUT=$(node scripts/fetch/redump.js output/redump versions.json 2>&1)
          echo "$OUTPUT"
          if [[ "$OUTPUT" != *"SKIP"* ]]; then
            echo "STATUS_REDUMP=Fetched" >> "$GITHUB_ENV"
            node scripts/validate.js output/redump
          fi

      - name: Fetch MAME
        run: |
          OUTPUT=$(node scripts/fetch/mame.js dats/mame versions.json 2>&1)
          echo "$OUTPUT"
          if [[ "$OUTPUT" != *"SKIP"* ]]; then
            echo "STATUS_MAME=Fetched" >> "$GITHUB_ENV"
            for arch in dats/mame/*; do
              [ -f "$arch" ] && node scripts/extract.js "$arch" .
            done
            node scripts/validate.js output/mame
          fi

      # --- RELAY PHASE ---

      - name: Relay all to meshARKade-database
        env:
          MESH_DATABASE_TOKEN: ${{ secrets.MESH_DATABASE_TOKEN }}
        run: |
          SOURCES=""
          [ -d output/no-intro ] && SOURCES="no-intro:output/no-intro"
          [ -d output/tosec ] && SOURCES="${SOURCES:+$SOURCES,}tosec:output/tosec"
          [ -d output/redump ] && SOURCES="${SOURCES:+$SOURCES,}redump:output/redump"
          [ -d output/mame ] && SOURCES="${SOURCES:+$SOURCES,}mame:output/mame"

          if [ -z "$SOURCES" ]; then
            echo "[relay] No sources updated today. Skipping relay."
            echo "RELAY_STATUS=Unchanged (None to process)" >> $GITHUB_ENV
          else
            echo "[relay] Relaying sources: $SOURCES"
            OUTPUT=$(node scripts/relay.js --sources "$SOURCES" 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "SKIP"; then
              echo "RELAY_STATUS=Unchanged (Identical to database)" >> $GITHUB_ENV
            else
              echo "RELAY_STATUS=Changes Relayed (PR opened/updated)" >> $GITHUB_ENV
            fi
          fi

      # --- CLEANUP & COMMIT PHASE ---

      - name: Commit updated versions.json
        run: |
          if git diff --quiet versions.json 2>/dev/null; then
            echo "versions.json unchanged, nothing to commit."
          else
            git config user.name "meshARKade-dats[bot]"
            git config user.email "dats-bot@mesharkade.dev"
            git add versions.json
            git commit -m "chore: update version tracking"
            git push
          fi

      # -----------------------------------------------------------------------
      # Notify Discord — success
      # -----------------------------------------------------------------------
      - name: Discord notification (success)
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SUMMARY="**Fetch Status**\n"
          SUMMARY="${SUMMARY}- No-Intro: ${STATUS_NOINTRO}\n"
          SUMMARY="${SUMMARY}- TOSEC: ${STATUS_TOSEC}\n"
          SUMMARY="${SUMMARY}- Redump: ${STATUS_REDUMP}\n"
          SUMMARY="${SUMMARY}- MAME: ${STATUS_MAME}\n"
          
          # Compute duration
          NOW=$(date +%s)
          DIFF=$((NOW - START_TIME))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          DURATION="${MINS}m ${SECS}s"

          SUMMARY="${SUMMARY}\n**Relay Status:** ${RELAY_STATUS:-Unknown}\n**Total Time:** ${DURATION}"

          if [ "$NO_INTRO_SKIPPED" = "true" ]; then
            SUMMARY="${SUMMARY}\n\n**⚠ No-Intro Warning:** \`${NO_INTRO_REASON}\`"
          fi
          
          # Escape for JSON
          SUMMARY_JSON=$(echo -e "$SUMMARY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"DAT Fetch Complete\",
              \"description\": ${SUMMARY_JSON},
              \"color\": 3066993,
              \"url\": \"https://github.com/Mesh-ARKade/meshARKade-dats/actions/runs/${{ github.run_id }}\"
            }]
          }" "$DISCORD_WEBHOOK_URL"

      # -----------------------------------------------------------------------
      # Notify Discord — failure
      # -----------------------------------------------------------------------
      - name: Discord notification (failure)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/Mesh-ARKade/meshARKade-dats/actions/runs/${{ github.run_id }}"
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"DAT Fetch Failed\",
              \"description\": \"[View logs](${RUN_URL})\",
              \"color\": 15158332
            }]
          }" "$DISCORD_WEBHOOK_URL"
